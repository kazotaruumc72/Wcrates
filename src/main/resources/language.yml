# Language configuration for Wcrates plugin
# All text displayed in the plugin can be customized here

# Menu titles and labels
menu:
  title: "&6&lCrate Creation Menu"

  # Slot 10 - Block type selector
  block_selector:
    name: "&eSelect Block Type"
    lore:
      - "&7Click to select the block type"
      - "&7for your crate"

  # Slot 12 - Crate name
  crate_name:
    name: "&aCrate Name"
    lore:
      - "&7Click to set the crate name"

  # Slot 13 - Display duration
  display_duration:
    name: "&6Display Duration"
    lore:
      - "&7Click to set display duration"
      - "&7Current: 3 seconds"
      - "&7(for placeholders display)"

  # Slot 14 - Crate ID
  crate_id:
    name: "&bCrate ID"
    lore:
      - "&7Click to set the crate identifier"

  # Slot 16 - Block placement mode
  block_placement:
    name: "&dPlace Crate Block"
    lore:
      - "&7Click to enter placement mode"
      - "&7Then right or left click a block"
      - "&7to transform it into your crate"

  # Slot 21 - Key selector (for later)
  key_selector:
    name: "&6Select Key"
    lore:
      - "&7Coming soon..."

  # Slot 22 - Create crate button
  create_crate:
    name: "&a&lCreate Crate"
    lore:
      - "&7Click to create the crate files"
      - "&7This will generate both:"
      - "&7- Crate config in crates/ folder"
      - "&7- Placeholder file in placeholders/ folder"

  # Slot 23 - Close button
  close:
    name: "&cClose Menu"
    lore:
      - "&7Click to close this menu"

  # Slot 4 - Result display
  result:
    name: "&eCrate Result"
    lore:
      - "&7This shows your configured crate"

# Block selection mode
block_selection:
  title: "&aSelect the block"
  subtitle: "&7Right/Left click to select"
  activated: "&aBlock placement mode activated!"
  deactivated: "&cBlock placement mode deactivated"
  success: "&aBlock transformed successfully into a crate!"

# Crate interaction messages
crate:
  opening: "&6&lOpening crate... Good luck!"
  no_permission: "&cYou don't have permission to use this crate!"
  invalid: "&cThis crate is not configured properly!"
  created_success: "&aSuccessfully created crate files!"
  created_error: "&cFailed to create crate files. Check console for details."
  already_exists: "&cCrate files already exist!"
  removed: "&aCrate location removed successfully!"
  delete:
    success: "&aSuccessfully deleted crate '%crate%' and removed %blocks% block(s)!"
    not_found: "&cCrate '%crate%' not found!"

# Messages
messages:
  no_permission: "&cYou don't have permission to use this command!"
  reload_success: "&aConfiguration reloaded successfully!"

  # Key-related messages
  key:
    usage: "&cUsage: /wcrate key <give>"
    give_usage: "&cUsage: /wcrate key give <player> <crate_id> [amount]"
    give_success: "&aSuccessfully gave {amount} key(s) for crate '{crate}' to {player}!"
    received: "&aYou received {amount} key(s) for crate '{crate}'!"
    player_not_found: "&cPlayer '{player}' not found!"
    crate_not_found: "&cCrate '{crate}' not found!"
    invalid_amount: "&cInvalid amount! Please specify a positive number."
